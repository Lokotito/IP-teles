name: Extract Streams

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'   # diario

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Run extractor
        run: python python/extract.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add revision_*.txt
          git commit -m "Update stream extraction" || echo "No changes"
          git push
